<html>
	<head>
		<base href="/applesauce-frontend/">
		<link rel="stylesheet" type="text/css" href="CSS/tooltipster.css" />
		<script type="text/javascript" src="JS/jquery.js"></script>
		<script type="text/javascript" src="JS/phaser.js"></script>
		<script type="text/javascript" src="JS/kong_splash_v2.js"></script>
		<link rel="stylesheet" type="text/css" href="CSS/tooltipster.css" />
		<script type="text/javascript" src="JS/jquery.tooltipster.min.js"></script>
		<link rel="stylesheet" href="gall/source/jquery.fancybox.css?v=2.1.5" type="text/css" media="screen" />
		<script type="text/javascript" src="gall/source/jquery.fancybox.pack.js?v=2.1.5"></script>
		<title>Rise of the Kal-rul</title>
		<link href="CSS/kong_main.css" rel="stylesheet" type="text/css">
		<script>

		$(document).ready(function() {
		    $('.tooltip').tooltipster();
		    $(".fancybox").fancybox();
		});
		radius2 = 125;
		radius3 = 125;
		radius4 = 125;
		var layers = [];
		var counter = 10;
			game = new Phaser.Game(1050, 750, Phaser.CANVAS, 'wrapper');
			main_state = {
				preload : function() {
					game.time.advancedTiming = true;
					game.load.tilemap('tilemap', 'JSON/splash2.json', null, Phaser.Tilemap.TILED_JSON);
					game.load.image('mine', 'images/map-sheets/mine.png');
					game.load.image('caveNew', 'images/map-sheets/caveNew.png');
					game.load.image('npcs', 'images/map-sheets/npcs.png');
					game.load.image('sandyCave', 'images/map-sheets/sandyCave.png');
					game.load.image('desertSand', 'images/map-sheets/desertSand.png');
				},
				create : function() {

					map = game.add.tilemap('tilemap');
					game.stage.backgroundColor = '#000000';
					map.addTilesetImage('mine', 'mine');
					map.addTilesetImage('caveNew', 'caveNew');
					map.addTilesetImage('npcs', 'npcs');
					map.addTilesetImage('sandyCave', 'sandyCave');
					map.addTilesetImage('desertSand', 'desertSand');

					game.canvas.id = 'gameCanvas';
					map.layers.forEach(function(entry) {
						layers.push(map.createLayer(entry.name));
					});
					layers[0].resizeWorld();

					this.shadowTexture = this.game.add.bitmapData(this.game.width, this.game.height);
					this.lightSprite = this.game.add.image(this.game.camera.x, this.game.camera.y, this.shadowTexture);
					this.lightSprite.blendMode = Phaser.blendModes.MULTIPLY;

				},
				update : function() {

					this.lightSprite.reset(this.game.camera.x, this.game.camera.y);
					this.updateShadowTexture();
				},
				render: function()
				{
					//game.debug.text(game.time.fps || '--', 99, 99, "#FFC0CB");
				},
				updateShadowTexture: function(radius){
					temp = this;


					var sAgent = window.navigator.userAgent;
					var Idx = sAgent.indexOf("MSIE");
					if (game.context.globalCompositeOperation == "multiply"){
						this.shadowTexture.context.fillStyle = 'rgb(100, 100, 100)';
						this.shadowTexture.context.fillRect(0, 0, this.game.width, this.game.height);
						try{
							x = 120
							y = 65
							radius = 200
							var gradient2 =
								temp.shadowTexture.context.createRadialGradient(
									x ,y , 100,
									x ,y , radius)
							gradient2.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
							gradient2.addColorStop(1, 'rgba(255, 255, 255, 0.0)');

							temp.shadowTexture.context.beginPath();
							temp.shadowTexture.context.fillStyle = gradient2;
							temp.shadowTexture.context.arc(x, y, radius, 0, Math.PI*2, false);
							temp.shadowTexture.context.fill();
							temp.shadowTexture.dirty = true;


							radius = 125;
							if(counter == 10){
							radius2 = radius + this.game.rnd.integerInRange(1,10);
							radius3 = radius + this.game.rnd.integerInRange(1,10);
							radius4 = radius + this.game.rnd.integerInRange(1,10);
							counter = 0;
							}

							counter++;

							x = 312
							y = 553
							var gradient2 =
								temp.shadowTexture.context.createRadialGradient(
									x ,y , 75,
									x ,y , radius2)
							gradient2.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
							gradient2.addColorStop(1, 'rgba(255, 255, 255, 0.0)');

							temp.shadowTexture.context.beginPath();
							temp.shadowTexture.context.fillStyle = gradient2;
							temp.shadowTexture.context.arc(x, y, radius, 0, Math.PI*2, false);
							temp.shadowTexture.context.fill();
							temp.shadowTexture.dirty = true;
							x = 698
							y = 553
							var gradient2 =
								temp.shadowTexture.context.createRadialGradient(
									x ,y , 75,
									x ,y , radius3)
							gradient2.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
							gradient2.addColorStop(1, 'rgba(255, 255, 255, 0.0)');

							temp.shadowTexture.context.beginPath();
							temp.shadowTexture.context.fillStyle = gradient2;
							temp.shadowTexture.context.arc(x, y, radius, 0, Math.PI*2, false);
							temp.shadowTexture.context.fill();
							temp.shadowTexture.dirty = true;


							x = 950
							y = 126
							var gradient2 =
								temp.shadowTexture.context.createRadialGradient(
									x ,y , 75,
									x ,y , radius4)
							gradient2.addColorStop(0, 'rgba(255, 255, 255, 1.0)');
							gradient2.addColorStop(1, 'rgba(255, 255, 255, 0.0)');

							temp.shadowTexture.context.beginPath();
							temp.shadowTexture.context.fillStyle = gradient2;
							temp.shadowTexture.context.arc(x, y, radius, 0, Math.PI*2, false);
							temp.shadowTexture.context.fill();
							temp.shadowTexture.dirty = true;



						
						}catch(err){
							console.log(err)
						}
					}

				},

			};
			game.state.add('main', main_state);
			game.state.start('main');
		</script>
	</head>
	<body class="unselectable" style="width:1060px; height:750px; overflow: hidden; background: black;">
		<div class="unselectable" tabindex="500" style="width:100%;  height: 100%;">
			<div id="logo" style="    position: absolute;left: 200px; width:600px;   top: 22px;"></div>
			<a class="fancybox fancybox.iframe" href="tutorial/tutorial.html">
			<div id="splash-tutorial" class="items tooltip" title="Tutorial"></div>
			</a>
			<a class="fancybox fancybox.iframe" href="HTML/news.html">
			<div id="splash-news" class="items tooltip" title="News Archives"></div>
			</a>
			<div id="splash-newsC"></div>
			<div id="splash-login" class="questTabs">Log In</div>

			<div class="unselectable" id="wrapper" style="font-size: 0; width:100%; height:100%; overflow: hidden;">
			</div>
		</div>
	</body>
</html>
